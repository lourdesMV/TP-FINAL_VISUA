<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/design-system-dd978c81-0cf2-450f-80da-c93d6f6d8505/uploads/styles.css">
  <script src="_ds/design-system-dd978c81-0cf2-450f-80da-c93d6f6d8505/_ds_bundle.js"></script>
  <script src="./image-slot.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    a { color: inherit; }
    a:hover { color: rgba(246,240,231,0.9); }
    @keyframes hero-cursor-blink { 0%, 45% { opacity: 1; } 50%, 95% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes hero-title-fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</helmet>

<section class="hero" aria-label="Introducción" data-screen-label="Hero" style="position:relative; min-height:100vh; display:grid; place-items:center; overflow:hidden; padding:3rem 1.5rem; isolation:isolate; border-bottom:1px solid rgba(255,255,255,0.12); font-family:'Inter','Georgia',sans-serif;">

  <div style="position:absolute; inset:0; z-index:-2; background:#2b1a14;">
    <image-slot id="holocausto-hero-img" shape="rect" fit="cover"
      placeholder="Foto documental de archivo (ej. campo, tren, monumento)"
      style="position:absolute; inset:0; width:100%; height:100%; filter:{{ imageFilter }};"></image-slot>
  </div>

  <div style="position:absolute; inset:0; z-index:-1; pointer-events:none; background:{{ overlayGradient }};">
  </div>

  <div style="position:absolute; inset:0; z-index:-1; pointer-events:none;
    background:
      radial-gradient(circle at 50% 42%, rgba(245,227,181,0.08), transparent 22%),
      linear-gradient(90deg, rgba(10,12,14,0.32), transparent 18%, transparent 82%, rgba(10,12,14,0.32));">
  </div>

  <div style="position:relative; z-index:2; max-width:1180px; padding:2.2rem 2rem; text-align:{{ textAlign }}; margin-left:{{ contentMarginLeft }}; margin-right:{{ contentMarginRight }};">
    <p style="margin:0 0 0.9rem; font-size:0.82rem; font-weight:700; letter-spacing:0.28em; text-transform:uppercase; color:{{ eyebrowColor }};">El Holocausto</p>
    <h1 style="margin:0; font-family:'Cormorant Garamond',Georgia,serif; font-size:clamp(2.4rem, 6.8vw, 6.1rem); line-height:0.96; letter-spacing:-0.03em; font-weight:600; color:#fefefe; text-wrap:balance; white-space:nowrap; min-height:1.2em; text-shadow:0 2px 18px rgba(0,0,0,0.34); {{ titleAnimStyle }}">
      {{ typedTitle }}<span style="{{ cursorStyle }}">|</span>
    </h1>
    <p style="max-width:44rem; margin:1.3rem {{ dekMarginAuto }} 0; font-size:clamp(1.05rem, 1.8vw, 1.2rem); color:rgba(246,240,231,0.82); line-height:1.7;">
      Entre 1933 y 1945, el régimen nazi asesinó sistemáticamente a seis millones de judíos y a millones de otras personas. Esta es la historia de cómo ocurrió, y por qué recordarla sigue importando.
    </p>
  </div>

</section>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { charCount: 0, done: false };

  componentDidMount() {
    this.fullTitle = "La historia que no debemos olvidar";
    this._start();
  }

  componentDidUpdate(prevProps) {
    if (prevProps.titleEffect !== this.props.titleEffect) {
      clearTimeout(this.startDelay);
      clearTimeout(this.timer);
      this.setState({ charCount: 0, done: false });
      this._start();
    }
  }

  _start() {
    const effect = this.props.titleEffect ?? "typewriter";
    if (effect === "instant") {
      this.setState({ charCount: this.fullTitle.length, done: true });
    } else if (effect === "fade-in") {
      this.setState({ charCount: this.fullTitle.length, done: true });
    } else {
      this.startDelay = setTimeout(() => this.tick(), 400);
    }
  }

  tick() {
    this.setState(s => {
      const next = s.charCount + 1;
      if (next >= this.fullTitle.length) {
        this.setState({ done: true });
        return { charCount: this.fullTitle.length };
      }
      return { charCount: next };
    });
    if (this.state.charCount < this.fullTitle.length) {
      const delay = 40 + Math.random() * 55;
      this.timer = setTimeout(() => this.tick(), delay);
    }
  }

  componentWillUnmount() {
    clearTimeout(this.startDelay);
    clearTimeout(this.timer);
  }

  renderVals() {
    const fullTitle = "La historia que no debemos olvidar";
    const effect = this.props.titleEffect ?? "typewriter";
    const mood = this.props.mood ?? "noir";
    const layout = this.props.layout ?? "centrado";

    const moods = {
      "noir": {
        overlayGradient: "linear-gradient(180deg, rgba(6,7,8,0.55) 0%, rgba(6,7,8,0.6) 30%, rgba(6,7,8,0.72) 100%), radial-gradient(circle at center, transparent 0 28%, rgba(0,0,0,0.28) 70% 100%)",
        imageFilter: "saturate(0.85) contrast(1.05) brightness(0.95)"
      },
      "sepia-archivo": {
        overlayGradient: "linear-gradient(180deg, rgba(43,26,15,0.6) 0%, rgba(43,26,15,0.55) 30%, rgba(20,12,8,0.78) 100%), radial-gradient(circle at center, transparent 0 26%, rgba(30,16,8,0.35) 70% 100%)",
        imageFilter: "sepia(0.45) saturate(1.1) contrast(1.05) brightness(0.92)"
      },
      "gris-memorial": {
        overlayGradient: "linear-gradient(180deg, rgba(20,20,20,0.5) 0%, rgba(20,20,20,0.5) 30%, rgba(10,10,10,0.75) 100%), radial-gradient(circle at center, transparent 0 28%, rgba(0,0,0,0.3) 70% 100%)",
        imageFilter: "grayscale(1) contrast(1.1) brightness(0.95)"
      }
    };
    const m = moods[mood] ?? moods["noir"];

    let titleAnimStyle = "";
    if (effect === "fade-in") {
      titleAnimStyle = "animation: hero-title-fade 1.1s ease-out both;";
    }

    const isLeft = layout === "editorial-izquierda";

    return {
      typedTitle: effect === "typewriter" ? fullTitle.slice(0, this.state.charCount) : fullTitle,
      cursorStyle: effect === "typewriter"
        ? `display:inline-block; animation: hero-cursor-blink 1s step-end infinite; font-weight:400; opacity:${this.state.done ? 1 : 0.9};`
        : "display:none;",
      overlayGradient: m.overlayGradient,
      imageFilter: m.imageFilter,
      textAlign: isLeft ? "left" : "center",
      contentMarginLeft: isLeft ? "0" : "auto",
      contentMarginRight: isLeft ? "auto" : "auto",
      dekMarginAuto: isLeft ? "0" : "auto",
      eyebrowColor: "rgba(245,239,227,0.8)",
      titleAnimStyle
    };
  }
}

</script>
</body>
</html>
